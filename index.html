<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ff6a00" />
<link rel="manifest" href="manifest.json" />

<title>5K Coach</title>

<style>
:root{
  --bg:#0f1115;
  --card:#171a21;
  --muted:#8b93a7;
  --text:#ffffff;
  --accent:#ff6a00;
  --blue:#4aa3ff;
  --red:#ff4d4d;
  --purple:#b26cff;
}

*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  padding-bottom:70px;
}

header{
  padding:16px;
  font-size:20px;
  font-weight:700;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.week-pill{
  background:var(--card);
  padding:6px 10px;
  border-radius:12px;
  font-size:12px;
  color:var(--muted);
}

.container{padding:12px;}

.card{
  background:var(--card);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

.row{display:flex;justify-content:space-between;align-items:center;}

button{
  background:var(--accent);
  border:none;
  color:#fff;
  padding:10px;
  border-radius:10px;
  font-weight:600;
}

button.secondary{
  background:#2a2f3a;
}

.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:#12141a;
  border-top:1px solid #222;
}

.nav button{
  flex:1;
  background:none;
  padding:14px;
  color:var(--muted);
  font-size:12px;
}

.nav button.active{
  color:var(--accent);
}

.hidden{display:none;}

.badge{
  font-size:11px;
  padding:4px 8px;
  border-radius:10px;
  background:#222;
  color:var(--muted);
}

input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:none;
  background:#222;
  color:#fff;
}

canvas{
  width:100%;
  background:#111;
  border-radius:12px;
  margin-top:10px;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:flex-end;
}

.modal-content{
  background:var(--card);
  padding:16px;
  border-radius:16px 16px 0 0;
  width:100%;
}
.small{font-size:12px;color:var(--muted);}
</style>
</head>

<body>

<header>
  <div>5K Coach</div>
  <div class="week-pill" id="weekDisplay">Week 1</div>
</header>

<div class="container">

<!-- PLAN -->
<div id="view-plan">

  <div class="card row">
    <button onclick="changeWeek(-1)" class="secondary">Undo Week</button>
    <button onclick="changeWeek(1)">Next Week</button>
  </div>

  <div id="planList"></div>

</div>

<!-- PROGRESS -->
<div id="view-progress" class="hidden">

  <div class="card">
    <div class="row">
      <div>Log Run</div>
    </div>

    <label>Minutes</label>
    <input id="min" type="number" />

    <label>Seconds</label>
    <input id="sec" type="number" />

    <label>Distance (km)</label>
    <input id="dist" type="number" step="0.1" />

    <label>Type</label>
    <select id="type">
      <option>Easy</option>
      <option>Tempo</option>
      <option>Intervals</option>
      <option>Long</option>
    </select>

    <button onclick="addRun()" style="margin-top:10px;">Save Run</button>
  </div>

  <div class="card">
    <div>Performance Trend</div>
    <canvas id="chart" height="160"></canvas>
  </div>

  <div id="history"></div>
</div>

<!-- SETTINGS -->
<div id="view-settings" class="hidden">
  <div class="card">
    <div>Settings</div>
    <p class="small">Data stored locally on device</p>
    <button class="secondary" onclick="clearAll()">Reset Data</button>
  </div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="switchTab('plan')" class="active">Plan</button>
  <button onclick="switchTab('progress')">Progress</button>
  <button onclick="switchTab('settings')">Settings</button>
</div>

<script>
let week = parseInt(localStorage.getItem('week') || "1");
let workouts = JSON.parse(localStorage.getItem('workouts') || "[]");

const planBase = [
  {day:"Monday",type:"Easy + Strength",desc:"Easy run + body strength",base:"5-6km easy"},
  {day:"Tuesday",type:"Intervals",desc:"Speed work",base:"6×400m or 5×1K"},
  {day:"Wednesday",type:"Recovery",desc:"Light jog or rest",base:"3-4km easy"},
  {day:"Thursday",type:"Tempo",desc:"Threshold run",base:"20 min tempo"},
  {day:"Friday",type:"Easy",desc:"Relaxed pace",base:"5km easy"},
  {day:"Saturday",type:"Long Run",desc:"Endurance",base:"8-12km"},
  {day:"Sunday",type:"Rest",desc:"Full recovery",base:"Rest"}
];

function intensity(){
  return 1 + (week-1)*0.03;
}

function renderPlan(){
  document.getElementById("weekDisplay").innerText = "Week " + week;
  const el = document.getElementById("planList");
  el.innerHTML = "";

  planBase.forEach((p,i)=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <div class="row">
        <strong>${p.day}</strong>
        <span class="badge">${p.type}</span>
      </div>
      <div class="small">${p.base}</div>
    `;
    div.onclick=()=>openModal(p);
    el.appendChild(div);
  });

  drawChart();
  renderHistory();
}

function openModal(p){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalContent").innerHTML=`
    <h3>${p.day} - ${p.type}</h3>
    <p>${p.desc}</p>
    <p class="small">Focus: ${p.base}</p>
    <button onclick="closeModal()">Close</button>
  `;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function changeWeek(d){
  week = Math.max(1, week + d);
  localStorage.setItem("week",week);
  renderPlan();
}

function switchTab(tab){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');

  ["plan","progress","settings"].forEach(t=>{
    document.getElementById("view-"+t).classList.add("hidden");
  });

  document.getElementById("view-"+tab).classList.remove("hidden");

  if(tab==="progress"){
    drawChart();
    renderHistory();
  }
}

function addRun(){
  const m=parseInt(min.value||0);
  const s=parseInt(sec.value||0);
  const d=parseFloat(dist.value||0);
  const type=typeSel().value;

  if(!d) return;

  workouts.push({
    id:Date.now(),
    time:m*60+s,
    dist:d,
    type,
    date:new Date().toISOString()
  });

  localStorage.setItem("workouts",JSON.stringify(workouts));
  renderHistory();
  drawChart();
}

function typeSel(){return document.getElementById("type");}

function renderHistory(){
  const h=document.getElementById("history");
  h.innerHTML="";
  workouts.slice().reverse().forEach(w=>{
    const pace=(w.time/w.dist/60).toFixed(2);
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <div class="row">
        <div>${w.type}</div>
        <button onclick="del(${w.id})">Delete</button>
      </div>
      <div class="small">${w.dist} km • ${pace} min/km</div>
    `;
    h.appendChild(div);
  });
}

function del(id){
  workouts=workouts.filter(w=>w.id!==id);
  localStorage.setItem("workouts",JSON.stringify(workouts));
  renderHistory();
  drawChart();
}

function drawChart(){
  const c=document.getElementById("chart");
  if(!c) return;
  const ctx=c.getContext("2d");

  const dpr=window.devicePixelRatio||1;
  c.width=c.offsetWidth*dpr;
  c.height=160*dpr;
  ctx.scale(dpr,dpr);

  ctx.clearRect(0,0,c.width,c.height);

  const data=workouts.slice(-20);
  if(data.length<2) return;

  const w=c.offsetWidth;
  const h=160;

  const max=Math.max(...data.map(d=>d.time/d.dist/60));
  const min=Math.min(...data.map(d=>d.time/d.dist/60));

  function color(t){
    return t==="Easy"?"#4aa3ff":
           t==="Tempo"?"#ff6a00":
           t==="Intervals"?"#ff4d4d":
           "#b26cff";
  }

  ctx.beginPath();

  data.forEach((d,i)=>{
    const pace=d.time/d.dist/60;
    const x=i/(data.length-1)*w;
    const y=h-((pace-min)/(max-min||1))*h;

    ctx.fillStyle=color(d.type);
    ctx.beginPath();
    ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fill();

    if(i>0){
      const prev=data[i-1];
      const py=h-(((prev.time/prev.dist/60)-min)/(max-min||1))*h;
      const px=(i-1)/(data.length-1)*w;
      ctx.strokeStyle="#444";
      ctx.beginPath();
      ctx.moveTo(px,py);
      ctx.lineTo(x,y);
      ctx.stroke();
    }
  });
}

function clearAll(){
  localStorage.clear();
  workouts=[];
  week=1;
  renderPlan();
}

renderPlan();
</script>

</body>
</html>
