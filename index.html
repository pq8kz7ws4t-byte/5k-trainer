<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ff6a00" />
<link rel="manifest" href="manifest.json" />

<title>5K Coach</title>

<style>
:root{
  --bg:#0f1115;
  --card:#171a21;
  --muted:#8b93a7;
  --text:#ffffff;
  --accent:#ff6a00;
}

*{
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  padding-bottom:70px;
}

header{
  padding:16px;
  font-size:20px;
  font-weight:700;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.week-pill{
  background:var(--card);
  padding:6px 10px;
  border-radius:12px;
  font-size:12px;
  color:var(--muted);
}

.container{padding:12px;}

.card{
  background:var(--card);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  background:var(--accent);
  border:none;
  color:#fff;
  padding:10px;
  border-radius:10px;
  font-weight:600;
}

button.secondary{
  background:#2a2f3a;
}

.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:#12141a;
  border-top:1px solid #222;
}

.nav button{
  flex:1;
  background:none;
  padding:14px;
  color:var(--muted);
  font-size:12px;
}

.nav button.active{
  color:var(--accent);
}

.hidden{display:none;}

.badge{
  font-size:11px;
  padding:4px 8px;
  border-radius:10px;
  background:#222;
  color:var(--muted);
}

input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:none;
  background:#222;
  color:#fff;
}

canvas{
  width:100%;
  background:#111;
  border-radius:12px;
  margin-top:10px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:999;
}

.modal-content{
  width:100%;
  max-width:420px;
  max-height:80vh;
  overflow-y:auto;
  background:var(--card);
  padding:16px;
  border-radius:16px;
}

.small{
  font-size:12px;
  color:var(--muted);
  line-height:1.4;
}

.section-title{
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.06em;
}

/* PHASE UI */
.phase-card{
  background:#12151c;
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
}

.phase-active{
  box-shadow:0 0 0 1px rgba(255,106,0,0.25), 0 8px 20px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<header>
  <div>5K Coach</div>
  <div class="week-pill" id="weekDisplay">Week 1</div>
</header>

<div class="container">

<!-- PLAN -->
<div id="view-plan">

  <div class="card row">
    <button class="secondary" onclick="changeWeek(-1)">Undo Week</button>
    <button onclick="changeWeek(1)">Next Week</button>
  </div>

  <div id="planList"></div>

  <div class="card">
    <button onclick="togglePhases()" style="width:100%">
      Show Phase Overview
    </button>
    <div id="phases" class="hidden" style="margin-top:12px;"></div>
  </div>

</div>

<!-- PROGRESS -->
<div id="view-progress" class="hidden">

  <div class="card">
    <div>Log Run</div>

    <label>Minutes</label>
    <input id="min" type="number" />

    <label>Seconds</label>
    <input id="sec" type="number" />

    <label>Distance (km)</label>
    <input id="dist" type="number" step="0.1" />

    <label>Type</label>
    <select id="type">
      <option>Easy</option>
      <option>Tempo</option>
      <option>Intervals</option>
      <option>Long</option>
    </select>

    <button onclick="addRun()" style="margin-top:10px;">Save Run</button>
  </div>

  <div class="card">
    <div>Performance Trend</div>
    <canvas id="chart" height="160"></canvas>
  </div>

  <div id="history"></div>
</div>

<!-- SETTINGS -->
<div id="view-settings" class="hidden">
  <div class="card">
    <div>Settings</div>
    <p class="small">Local storage only</p>
    <button class="secondary" onclick="clearAll()">Reset Data</button>
  </div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="switchTab('plan')" class="active">Plan</button>
  <button onclick="switchTab('progress')">Progress</button>
  <button onclick="switchTab('settings')">Settings</button>
</div>

<script>

let week = parseInt(localStorage.getItem('week') || "1");
let workouts = JSON.parse(localStorage.getItem('workouts') || "[]");

/* ─────────────────────────────
   PLAN UI
──────────────────────────── */
const planBase = [
  {day:"Monday",type:"Easy + Strength",summary:"Aerobic base + strength"},
  {day:"Tuesday",type:"Intervals",summary:"Speed development"},
  {day:"Wednesday",type:"Recovery",summary:"Light recovery"},
  {day:"Thursday",type:"Tempo",summary:"Threshold work"},
  {day:"Friday",type:"Easy",summary:"Easy aerobic run"},
  {day:"Saturday",type:"Long",summary:"Endurance session"},
  {day:"Sunday",type:"Rest",summary:"Full recovery"}
];

/* ─────────────────────────────
   PHASE SYSTEM
──────────────────────────── */
function getPhase(w){
  if(w<=4) return 1;
  if(w<=8) return 2;
  if(w<=12) return 3;
  if(w<=16) return 4;
  if(w<=20) return 5;
  return 6;
}

/* ─────────────────────────────
   WORKOUT ENGINE (PHASE CONTROLLED)
──────────────────────────── */
function buildWorkoutDetails(p){

  const phase = getPhase(week);

  let distance="", pace="", purpose="";

  /* PHASE 1 */
  if(phase===1){
    if(p.type.includes("Easy")){
      distance="5–7 km";
      pace="5:30–6:15/km";
      purpose="Aerobic base development";
    }
    if(p.type==="Long"){
      distance="60–75 min";
      pace="Easy pace";
      purpose="Endurance foundation";
    }
    if(p.type==="Intervals"){
      distance="NOT ALLOWED IN PHASE 1";
      pace="—";
      purpose="Intervals begin in Phase 2";
    }
    if(p.type==="Tempo"){
      distance="Not available yet";
      pace="—";
      purpose="Introduced in Phase 2";
    }
  }

  /* PHASE 2 */
  if(phase===2){
    if(p.type==="Tempo"){
      distance="15–25 min";
      pace="4:25–4:50/km";
      purpose="Threshold introduction";
    }
    if(p.type==="Intervals"){
      distance="Light strides / hills";
      pace="Controlled fast effort";
      purpose="Neuromuscular activation";
    }
  }

  /* PHASE 3 */
  if(phase===3){
    if(p.type==="Intervals"){
      distance="400m–1K repeats";
      pace="3:45–4:05/km";
      purpose="Structured speed development";
    }
    if(p.type==="Tempo"){
      distance="20–30 min";
      pace="4:10–4:35/km";
      purpose="Threshold progression";
    }
  }

  /* PHASE 4 */
  if(phase===4){
    if(p.type==="Intervals"){
      distance="800m–1K @ 5K effort";
      pace="3:35–3:55/km";
      purpose="VO₂ max development";
    }
  }

  /* PHASE 5 */
  if(phase===5){
    if(p.type==="Intervals"){
      distance="1K + 400m race prep";
      pace="~4:00/km";
      purpose="Race-specific work";
    }
  }

  /* PHASE 6 */
  if(phase===6){
    if(p.type==="Intervals"){
      distance="Short sharpening reps";
      pace="Fast but controlled";
      purpose="Taper sharpening";
    }
  }

  return {distance,pace,purpose};
}

/* ─────────────────────────────
   PLAN RENDER
──────────────────────────── */
function renderPlan(){
  document.getElementById("weekDisplay").innerText="Week "+week;

  const el=document.getElementById("planList");
  el.innerHTML="";

  planBase.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <div class="row">
        <strong>${p.day}</strong>
        <span class="badge">${p.type}</span>
      </div>
      <div class="small">${p.summary}</div>
    `;
    div.onclick=()=>openModal(p);
    el.appendChild(div);
  });

  drawChart();
  renderHistory();
  renderPhases();
}

/* ─────────────────────────────
   MODAL + PHASE BLOCK
──────────────────────────── */
function openModal(p){

  const phase=getPhase(week);

  if(phase===1 && p.type==="Intervals"){
    document.getElementById("modal").style.display="flex";
    document.getElementById("modalContent").innerHTML=`
      <h3>${p.day} — ${p.type}</h3>
      <div class="section-title">Not available</div>
      <p class="small">Phase 1 focuses on aerobic base. Intervals start in Phase 2.</p>
      <button style="margin-top:12px;width:100%" onclick="closeModal()">Close</button>
    `;
    return;
  }

  const d=buildWorkoutDetails(p);

  document.getElementById("modal").style.display="flex";
  document.getElementById("modalContent").innerHTML=`
    <h3>${p.day} — ${p.type}</h3>

    <div class="section-title">Distance</div>
    <p class="small">${d.distance}</p>

    <div class="section-title">Target Pace</div>
    <p class="small">${d.pace}</p>

    <div class="section-title">Purpose</div>
    <p class="small">${d.purpose}</p>

    <button style="margin-top:12px;width:100%" onclick="closeModal()">Close</button>
  `;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* ─────────────────────────────
   PHASE UI
──────────────────────────── */
function getPhases(){
  return [
    {name:"Base Building",start:1,end:4,color:"#4aa3ff",focus:"Easy running, long runs 60–75 min"},
    {name:"Aerobic Strength",start:5,end:8,color:"#4aa3ff",focus:"Tempo + light hills"},
    {name:"Threshold + Speed",start:9,end:12,color:"#ff6a00",focus:"400m–1K intervals introduced"},
    {name:"VO₂ Max",start:13,end:16,color:"#ff4d4d",focus:"800m–1K @ 5K effort"},
    {name:"Race Specific",start:17,end:20,color:"#b26cff",focus:"Race pace work"},
    {name:"Peak + Taper",start:21,end:24,color:"#22c55e",focus:"Sharpening + reduced volume"}
  ];
}

function renderPhases(){
  const el=document.getElementById("phases");
  el.innerHTML="";

  getPhases().forEach(p=>{
    const active=week>=p.start && week<=p.end;

    const div=document.createElement("div");
    div.className="phase-card"+(active?" phase-active":"");
    div.style.borderLeft=`4px solid ${p.color}`;

    div.innerHTML=`
      <div class="row">
        <strong>${p.name}</strong>
        <span class="badge">${p.start}–${p.end}</span>
      </div>
      <div class="small">${p.focus}</div>
      ${active?`<div style="color:${p.color};font-size:11px;margin-top:6px;font-weight:700;">CURRENT PHASE</div>`:""}
    `;

    el.appendChild(div);
  });
}

function togglePhases(){
  document.getElementById("phases").classList.toggle("hidden");
  renderPhases();
}

/* ─────────────────────────────
   WEEK
──────────────────────────── */
function changeWeek(d){
  week=Math.max(1,week+d);
  localStorage.setItem("week",week);
  renderPlan();
}

/* ─────────────────────────────
   LOGGING
──────────────────────────── */
function addRun(){
  const m=parseInt(min.value||0);
  const s=parseInt(sec.value||0);
  const d=parseFloat(dist.value||0);
  const t=type.value;

  workouts.push({id:Date.now(),time:m*60+s,dist:d,type:t});
  localStorage.setItem("workouts",JSON.stringify(workouts));

  renderHistory();
  drawChart();
}

/* ─────────────────────────────
   HISTORY
──────────────────────────── */
function renderHistory(){
  const h=document.getElementById("history");
  h.innerHTML="";

  workouts.slice().reverse().forEach(w=>{
    const pace=(w.time/w.dist/60).toFixed(2);

    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <div class="row">
        <div>${w.type}</div>
        <button onclick="del(${w.id})">Delete</button>
      </div>
      <div class="small">${w.dist} km • ${pace} min/km</div>
    `;
    h.appendChild(div);
  });
}

function del(id){
  workouts=workouts.filter(w=>w.id!==id);
  localStorage.setItem("workouts",JSON.stringify(workouts));
  renderHistory();
  drawChart();
}

/* ─────────────────────────────
   CHART (FIXED + LEGEND + DOT FIX)
──────────────────────────── */
function drawChart(){
  const c=document.getElementById("chart");
  if(!c) return;

  const ctx=c.getContext("2d");

  const dpr=window.devicePixelRatio||1;
  c.width=c.offsetWidth*dpr;
  c.height=190*dpr;
  ctx.scale(dpr,dpr);

  ctx.clearRect(0,0,c.width,c.height);

  const data=workouts.slice(-20);
  if(!data.length) return;

  const w=c.offsetWidth;
  const h=140;

  const pace=d=>d.time/d.dist/60;
  const vals=data.map(pace);
  const max=Math.max(...vals);
  const min=Math.min(...vals);

  const color=t=>(
    t==="Easy"?"#4aa3ff":
    t==="Tempo"?"#ff6a00":
    t==="Intervals"?"#ff4d4d":
    "#b26cff"
  );

  data.forEach((d,i)=>{
    const x=data.length===1?w/2:(i/(data.length-1))*w;
    const y=h-((pace(d)-min)/((max-min)||1))*h;

    ctx.beginPath();
    ctx.fillStyle=color(d.type);
    ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fill();

    if(i>0){
      const p=data[i-1];
      const px=((i-1)/(data.length-1))*w;
      const py=h-((pace(p)-min)/((max-min)||1))*h;

      ctx.strokeStyle="#333";
      ctx.beginPath();
      ctx.moveTo(px,py);
      ctx.lineTo(x,y);
      ctx.stroke();
    }
  });

  const legend=[
    {t:"Easy",c:"#4aa3ff"},
    {t:"Tempo",c:"#ff6a00"},
    {t:"Intervals",c:"#ff4d4d"},
    {t:"Long",c:"#b26cff"}
  ];

  const y=165;

  legend.forEach((l,i)=>{
    const x=i*(w/4);

    ctx.beginPath();
    ctx.fillStyle=l.c;
    ctx.arc(x+10,y,4,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#8b93a7";
    ctx.font="11px -apple-system, Arial";
    ctx.fillText(l.t,x+20,y+4);
  });
}

/* ─────────────────────────────
   RESET
──────────────────────────── */
function clearAll(){
  localStorage.clear();
  workouts=[];
  week=1;
  renderPlan();
}

renderPlan();

</script>

</body>
</html>
