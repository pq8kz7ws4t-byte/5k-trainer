<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5K Coach</title>

<style>
:root{
  --orange:#ff6a00;
  --easy:#4fc3f7;
  --tempo:#ff9800;
  --interval:#f44336;
  --long:#9c27b0;
  --bg:#0f0f10;
  --card:#1c1c1f;
  --text:#fff;
}

body{
  margin:0;
  font-family:-apple-system;
  background:var(--bg);
  color:var(--text);
}

.header{
  position:fixed;
  top:0;
  width:100%;
  background:#1c1c1f;
  padding:14px;
  text-align:center;
  color:var(--orange);
  font-weight:700;
}

.content{ padding:70px 15px 110px; }

.card{
  background:var(--card);
  padding:15px;
  border-radius:14px;
  margin-bottom:15px;
}

h3{ color:var(--orange); margin:0 0 10px; }

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:var(--orange);
  color:white;
  font-weight:600;
}

.entry{
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.details{
  font-size:12px;
  color:#aaa;
  margin-top:5px;
}

.delete{
  float:right;
  color:#ff4d4d;
}

canvas{
  width:100%;
  height:200px;
}
</style>
</head>

<body>

<div class="header">🔥 5K COACH</div>

<div class="content">

<!-- WEEK -->
<div class="card">
  <h3>Week</h3>
  <div>Week: <span id="weekLabel"></span></div>
  <button onclick="nextWeek()">Next Week</button>
  <button onclick="undoWeek()">Undo Week</button>
</div>

<!-- PLAN -->
<div class="card">
  <h3>Training Plan</h3>
  <div id="plan"></div>
</div>

<!-- LOG -->
<div class="card">
  <h3>Log Workout</h3>

  <input id="min" type="number" placeholder="minutes">
  <input id="sec" type="number" placeholder="seconds">
  <input id="dist" type="number" step="0.1" placeholder="distance km">

  <select id="type">
    <option>Easy</option>
    <option>Tempo</option>
    <option>Intervals</option>
    <option>Long Run</option>
  </select>

  <button onclick="saveWorkout()">Save</button>
</div>

<!-- GRAPH -->
<div class="card">
  <h3>Fitness Trend</h3>
  <canvas id="chart"></canvas>
  <div id="legend"></div>
</div>

<!-- HISTORY -->
<div class="card">
  <h3>History</h3>
  <div id="list"></div>
</div>

</div>

<script>

/* ---------------- STATE ---------------- */

function get(){
  return {
    week:+(localStorage.getItem("week")||1),
    history:JSON.parse(localStorage.getItem("history")||"[]")
  };
}

function save(s){
  localStorage.setItem("week",s.week);
  localStorage.setItem("history",JSON.stringify(s.history));
}

/* ---------------- COLORS ---------------- */

const colors = {
  "Easy":"#4fc3f7",
  "Tempo":"#ff9800",
  "Intervals":"#f44336",
  "Long Run":"#9c27b0"
};

/* ---------------- WEEK ---------------- */

function nextWeek(){
  let s=get();
  s.week++;
  save(s);
  render();
}

function undoWeek(){
  let s=get();
  s.week=Math.max(1,s.week-1);
  save(s);
  render();
}

/* ---------------- SAVE ---------------- */

function saveWorkout(){

  let s=get();

  let m=+min.value;
  let sec=+sec.value;
  let dist=+dist.value;

  if(isNaN(m)||isNaN(sec)||isNaN(dist)) return;

  let time=`${m}:${Math.min(sec,59).toString().padStart(2,'0')}`;

  s.history.push({
    time,
    dist,
    type:type.value
  });

  save(s);
  render();
}

/* ---------------- DELETE ---------------- */

function del(i){
  let s=get();
  s.history.splice(i,1);
  save(s);
  render();
}

/* ---------------- TRAINING PLAN (CLICKABLE) ---------------- */

function plan(w){

  const data = {
    "Mon": {title:"Easy + Strength", desc:"5–8km @ 5:30–6:00/km + gym strength"},
    "Tue": {title:"Intervals", desc:"6×400m @ 4:00/km, 90s rest"},
    "Wed": {title:"Recovery", desc:"30 min very easy jog or bike"},
    "Thu": {title:"Tempo", desc:"20 min @ 4:30–4:45/km"},
    "Fri": {title:"Easy", desc:"5–7km relaxed"},
    "Sat": {title:"Long Run", desc:"60–80 min @ 5:30–6:15/km"},
    "Sun": {title:"Rest", desc:"Full recovery"}
  };

  return Object.entries(data).map(([k,v])=>`
    <div onclick="alert('${v.title}\\n\\n${v.desc}')">
      <b>${k}:</b> ${v.title}
      <div style="font-size:12px;color:#aaa">${v.desc}</div>
    </div>
  `).join("");
}

/* ---------------- GRAPH ---------------- */

function draw(){

  let s=get();
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  let grouped={};

  s.history.forEach(r=>{
    let [m,sec]=r.time.split(":");
    let pace=((+m*60+ +sec)/r.dist);
    if(!grouped[r.type]) grouped[r.type]=[];
    grouped[r.type].push(pace);
  });

  let xIndex=0;

  Object.keys(grouped).forEach(type=>{

    let arr=grouped[type];
    let color=colors[type]||"#fff";

    ctx.strokeStyle=color;
    ctx.fillStyle=color;
    ctx.beginPath();

    arr.forEach((v,i)=>{

      let x=i*25;
      let y=c.height-v*10;

      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);

      ctx.beginPath();
      ctx.arc(x,y,4,0,Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x,y);
    });

    ctx.stroke();
  });

  // legend
  document.getElementById("legend").innerHTML =
    Object.keys(colors).map(k=>
      `<span style="color:${colors[k]}">● ${k}</span> `
    ).join(" ");
}

/* ---------------- RENDER ---------------- */

function render(){

  let s=get();

  weekLabel.innerText=s.week;

  document.getElementById("plan").innerHTML=plan(s.week);

  document.getElementById("list").innerHTML=
    s.history.map((r,i)=>`
      <div class="entry">
        <span onclick="del(${i})">✕</span>
        ${r.type} ${r.time} ${r.dist}km
      </div>
    `).join("");

  draw();
}

render();

</script>

</body>
</html>
