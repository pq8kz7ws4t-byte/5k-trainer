<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5K Coach</title>

<style>
:root{
  --orange:#ff6a00;
  --bg:#0f0f10;
  --card:#1c1c1f;
  --text:#fff;
}

body{
  margin:0;
  font-family:-apple-system;
  background:var(--bg);
  color:var(--text);
}

.header{
  position:fixed;
  top:0;
  width:100%;
  background:#1c1c1f;
  padding:14px;
  text-align:center;
  color:var(--orange);
  font-weight:700;
}

/* ---------------- PAGES ---------------- */

.page{
  display:none;
  padding:70px 15px 110px;
}

.activePage{
  display:block;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:14px;
  margin-bottom:15px;
}

h3{
  color:var(--orange);
  margin:0 0 10px;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:var(--orange);
  color:white;
  font-weight:600;
}

.entry{
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.delete{
  float:right;
  color:#ff4d4d;
}

/* ---------------- NAV ---------------- */

.tabbar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#1c1c1f;
  border-top:1px solid #333;
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:12px;
  color:#aaa;
}

.active{
  color:var(--orange);
  font-weight:700;
}

canvas{
  width:100%;
  height:200px;
}
</style>
</head>

<body>

<div class="header">🔥 5K COACH</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page activePage">

  <div class="card">
    <h3>Week</h3>
    <div>Current: <span id="weekLabel"></span></div>
    <button onclick="nextWeek()">Next Week</button>
    <button onclick="undoWeek()">Undo Week</button>
  </div>

  <div class="card">
    <h3>Log Workout</h3>

    <input id="min" type="number" placeholder="minutes">
    <input id="sec" type="number" placeholder="seconds">
    <input id="dist" type="number" step="0.1" placeholder="km">

    <select id="type">
      <option>Easy</option>
      <option>Tempo</option>
      <option>Intervals</option>
      <option>Long Run</option>
    </select>

    <button onclick="saveWorkout()">Save Workout</button>
  </div>

  <div class="card">
    <h3>Weekly Plan</h3>
    <div id="plan"></div>
  </div>

</div>

<!-- PROGRESS -->
<div id="progress" class="page">

  <div class="card">
    <h3>Fitness Trend</h3>
    <canvas id="chart"></canvas>
    <div id="legend"></div>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="list"></div>
  </div>

</div>

<!-- SETTINGS -->
<div id="settings" class="page">

  <div class="card">
    <button onclick="resetAll()">Reset All</button>
  </div>

</div>

<!-- NAV -->
<div class="tabbar">
  <div class="tab active" onclick="nav('dashboard',this)">Plan</div>
  <div class="tab" onclick="nav('progress',this)">Progress</div>
  <div class="tab" onclick="nav('settings',this)">Settings</div>
</div>

<script>

/* ---------------- STATE ---------------- */

function getState(){
  return {
    week:+(localStorage.getItem("week")||1),
    history:JSON.parse(localStorage.getItem("history")||"[]")
  };
}

function saveState(s){
  localStorage.setItem("week",s.week);
  localStorage.setItem("history",JSON.stringify(s.history));
}

/* ---------------- NAV ---------------- */

function nav(page,el){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
  document.getElementById(page).classList.add("activePage");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

/* ---------------- WEEK ---------------- */

function nextWeek(){
  let s=getState();
  s.week++;
  saveState(s);
  render();
}

function undoWeek(){
  let s=getState();
  s.week=Math.max(1,s.week-1);
  saveState(s);
  render();
}

/* ---------------- SAVE ---------------- */

function saveWorkout(){

  let s=getState();

  const m = +document.getElementById("min").value;
  const sec = +document.getElementById("sec").value;
  const dist = +document.getElementById("dist").value;
  const type = document.getElementById("type").value;

  if(!m || !sec || !dist){
    alert("Fill all fields");
    return;
  }

  const time = `${m}:${Math.min(sec,59).toString().padStart(2,'0')}`;

  s.history.push({time,dist,type});

  saveState(s);

  document.getElementById("min").value="";
  document.getElementById("sec").value="";
  document.getElementById("dist").value="";

  render();
}

/* ---------------- DELETE ---------------- */

function del(i){
  let s=getState();
  s.history.splice(i,1);
  saveState(s);
  render();
}

/* ---------------- PLAN ---------------- */

function showWorkout(i){

  const data = [
    ["Monday","Easy + Strength","5–8km @ 5:30–6:00/km"],
    ["Tuesday","Intervals","6×400m @ 4:00/km"],
    ["Wednesday","Recovery","30–40 min easy"],
    ["Thursday","Tempo","20 min @ 4:30–4:45/km"],
    ["Friday","Easy","5–7km relaxed"],
    ["Saturday","Long Run","60–80 min easy"],
    ["Sunday","Rest","Full recovery"]
  ][i];

  alert(`${data[0]}\n\n${data[1]}\n\n${data[2]}`);
}

function plan(){

  const days = [
    "Monday: Easy + Strength",
    "Tuesday: Intervals",
    "Wednesday: Recovery",
    "Thursday: Tempo",
    "Friday: Easy",
    "Saturday: Long Run",
    "Sunday: Rest"
  ];

  return days.map((d,i)=>
    `<div class="entry" onclick="showWorkout(${i})">${d}</div>`
  ).join("");
}

/* ---------------- GRAPH (FIXED) ---------------- */

function draw(){

  let s=getState();
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");

  c.width = c.offsetWidth;
  c.height = 200;

  ctx.clearRect(0,0,c.width,c.height);

  const colors = {
    "Easy":"#4fc3f7",
    "Tempo":"#ff9800",
    "Intervals":"#f44336",
    "Long Run":"#9c27b0"
  };

  let grouped={};

  s.history.forEach(r=>{
    let [m,sec]=r.time.split(":");
    let pace=((+m*60+ +sec)/r.dist);

    if(!grouped[r.type]) grouped[r.type]=[];
    grouped[r.type].push(pace);
  });

  Object.keys(grouped).forEach(type=>{

    let arr=grouped[type];
    let color=colors[type]||"#fff";

    ctx.beginPath();
    ctx.strokeStyle=color;
    ctx.fillStyle=color;

    arr.forEach((v,i)=>{

      let x = (i+1)*(c.width/(arr.length+1));
      let y = c.height - v*10;

      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);

    });

    ctx.stroke();

    arr.forEach((v,i)=>{

      let x = (i+1)*(c.width/(arr.length+1));
      let y = c.height - v*10;

      ctx.beginPath();
      ctx.arc(x,y,5,0,Math.PI*2);
      ctx.fillStyle=color;
      ctx.fill();

    });

  });

  document.getElementById("legend").innerHTML = `
    <span style="color:#4fc3f7">● Easy</span>
    <span style="color:#ff9800">● Tempo</span>
    <span style="color:#f44336">● Intervals</span>
    <span style="color:#9c27b0">● Long Run</span>
  `;
}

/* ---------------- RENDER ---------------- */

function render(){

  let s=getState();

  weekLabel.innerText=s.week;

  document.getElementById("plan").innerHTML=plan();

  document.getElementById("list").innerHTML=
    s.history.map((r,i)=>
      `<div class="entry">
        ${r.type} ${r.time} ${r.dist}km
        <span class="delete" onclick="del(${i})">✕</span>
      </div>`
    ).join("");

  draw();
}

render();

</script>

</body>
</html>
