<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5K Coach Pro</title>

<style>
:root{
  --orange:#ff6a00;
  --bg:#0f0f10;
  --card:#1c1c1f;
  --text:#fff;
  --muted:#aaa;
}

body{
  margin:0;
  font-family:-apple-system;
  background:var(--bg);
  color:var(--text);
}

.header{
  position:fixed;
  top:0;
  width:100%;
  background:#1c1c1f;
  padding:14px;
  text-align:center;
  color:var(--orange);
  font-weight:700;
}

.content{ padding:70px 15px 110px; }

.card{
  background:var(--card);
  padding:15px;
  border-radius:14px;
  margin-bottom:15px;
}

h3{ color:var(--orange); margin:0 0 10px 0; }

.small{ color:var(--muted); font-size:13px; }

input, select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:var(--orange);
  color:white;
  font-weight:600;
}

/* picker */
.picker-row{
  display:flex;
  gap:10px;
}

.wheel{
  flex:1;
  height:140px;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  background:#111;
  border-radius:10px;
  border:1px solid #333;
}

.wheel div{
  height:40px;
  display:flex;
  justify-content:center;
  align-items:center;
  scroll-snap-align:center;
}

/* highlight center */
.wheel div:hover{
  background:rgba(255,106,0,0.2);
}

/* list */
.entry{
  padding:8px;
  border-bottom:1px solid #333;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

.delete{
  color:#ff4d4d;
  cursor:pointer;
}

/* nav */
.tabbar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#1c1c1f;
  border-top:1px solid #333;
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:12px;
  color:#aaa;
}

.active{ color:var(--orange); font-weight:700; }

.hidden{ display:none; }

canvas{
  width:100%;
  height:180px;
}
</style>
</head>

<body>

<div class="header">🔥 5K COACH PRO</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="card">
    <h3>Week Control</h3>
    <input type="number" id="weekInput" min="1">
    <button onclick="setWeek()">Set Week</button>
    <div class="small">Plan updates when you change week</div>
  </div>

  <div class="card">
    <h3>This Week Plan</h3>
    <div id="plan"></div>
  </div>

  <div class="card">
    <h3>Log Workout</h3>

    <label>Time</label>
    <div class="picker-row">
      <div class="wheel" id="minWheel"></div>
      <div class="wheel" id="secWheel"></div>
    </div>

    <label>Distance (km)</label>
    <input id="dist" type="number" step="0.1">

    <label>Type</label>
    <select id="type">
      <option>Easy</option>
      <option>Tempo</option>
      <option>Intervals</option>
      <option>Long Run</option>
    </select>

    <button onclick="saveWorkout()">Save Workout</button>
  </div>

</div>

<!-- PROGRESS -->
<div id="progress" class="hidden">

  <div class="card">
    <h3>Fitness Trend</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>Workouts</h3>
    <div id="list"></div>
  </div>

</div>

<!-- SETTINGS -->
<div id="settings" class="hidden">
  <div class="card">
    <button onclick="reset()">Reset All Data</button>
  </div>
</div>

</div>

<div class="tabbar">
  <div class="tab active" onclick="nav('dashboard',this)">Plan</div>
  <div class="tab" onclick="nav('progress',this)">Progress</div>
  <div class="tab" onclick="nav('settings',this)">Settings</div>
</div>

<script>

/* ---------------- STATE ---------------- */

function get(){
  return {
    week:+(localStorage.getItem("week")||1),
    data:JSON.parse(localStorage.getItem("data")||"[]")
  };
}

function save(s){
  localStorage.setItem("week",s.week);
  localStorage.setItem("data",JSON.stringify(s.data));
}

/* ---------------- WHEELS ---------------- */

let minSel=25;
let secSel=0;

function build(){
  let m=document.getElementById("minWheel");
  let s=document.getElementById("secWheel");

  for(let i=10;i<=60;i++){
    m.innerHTML+=`<div onclick="minSel=${i}">${i}</div>`;
  }

  for(let i=0;i<60;i++){
    s.innerHTML+=`<div onclick="secSel=${i}">${i.toString().padStart(2,'0')}</div>`;
  }
}

/* ---------------- LOG ---------------- */

function saveWorkout(){
  let s=get();

  let time=`${minSel}:${secSel.toString().padStart(2,'0')}`;

  s.data.push({
    time,
    dist:+dist.value,
    type:type.value,
    week:s.week,
    date:new Date().toISOString()
  });

  save(s);
  render();
}

/* ---------------- DELETE ---------------- */

function del(i){
  let s=get();
  s.data.splice(i,1);
  save(s);
  render();
}

/* ---------------- WEEK ---------------- */

function setWeek(){
  let s=get();
  s.week=+weekInput.value;
  save(s);
  render();
}

/* ---------------- PLAN ---------------- */

function plan(week){
  if(week<4) return ["Base: Easy + strides","Tempo","Recovery","Long"];
  if(week<8) return ["Threshold","Intervals","Recovery","Long"];
  return ["VO2","Race pace","Recovery","Long"];
}

/* ---------------- CHART ---------------- */

function draw(){
  let s=get();
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  let runs=s.data.filter(x=>x.type==="Easy"||x.type==="Tempo");

  runs.forEach((r,i)=>{
    let p=r.time.split(":");
    let sec=+p[0]*60+ +p[1];

    let x=i*30;
    let y=c.height-(sec/5);

    ctx.fillStyle="#ff6a00";
    ctx.fillRect(x,y,6,6);
  });
}

/* ---------------- RENDER ---------------- */

function render(){
  let s=get();

  weekInput.value=s.week;

  document.getElementById("plan").innerHTML=
    plan(s.week).map(x=>"• "+x).join("<br>");

  document.getElementById("list").innerHTML=
    s.data.map((d,i)=>
      `<div class="entry">
        ${d.type} ${d.time} ${d.dist}km
        <span class="delete" onclick="del(${i})">✕</span>
      </div>`
    ).join("");

  draw();
}

/* ---------------- NAV ---------------- */

function nav(id,el){
  ["dashboard","progress","settings"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

/* RESET */

function reset(){
  localStorage.clear();
  render();
}

/* INIT */

build();
render();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
