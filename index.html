<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5K Coach</title>

<style>
:root{
  --orange:#ff6a00;
  --bg:#0f0f10;
  --card:#1c1c1f;
  --text:#fff;
  --muted:#aaa;
}

body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.header{
  position:fixed;
  top:0;
  width:100%;
  background:#1c1c1f;
  padding:14px;
  text-align:center;
  font-weight:700;
  color:var(--orange);
  border-bottom:1px solid #333;
}

.content{
  padding:70px 15px 100px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:14px;
  margin-bottom:15px;
}

h3{ color:var(--orange); margin-top:0; }

.small{ color:var(--muted); font-size:13px; }

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--orange);
  color:white;
  font-size:16px;
  font-weight:600;
  margin-top:10px;
}

/* ---------------- WHEEL PICKER ---------------- */

.picker-row{
  display:flex;
  gap:10px;
  justify-content:space-between;
}

.wheel{
  flex:1;
  height:140px;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  border:1px solid #333;
  border-radius:10px;
  background:#111;
}

.wheel div{
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  scroll-snap-align:center;
  color:white;
  font-size:18px;
}

.wheel::-webkit-scrollbar{
  display:none;
}

/* ---------------- NAV ---------------- */

.tabbar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#1c1c1f;
  border-top:1px solid #333;
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:12px;
  color:#aaa;
}

.active{ color:var(--orange); font-weight:700; }

.hidden{ display:none; }

</style>
</head>

<body>

<div class="header">🔥 5K COACH</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="card">
    <h3>Phase</h3>
    <div id="phase"></div>
    <div class="small">Goal: 20:00 (4:00/km)</div>
  </div>

  <div class="card">
    <h3>This Week</h3>
    <div id="week"></div>
  </div>

  <div class="card">
    <h3>Log 5K (Scroll Input)</h3>

    <div class="picker-row">

      <div class="wheel" id="minWheel"></div>
      <div class="wheel" id="secWheel"></div>

    </div>

    <button onclick="logRun()">Save Run</button>
  </div>

</div>

<!-- PROGRESS -->
<div id="progress" class="hidden">
  <div class="card">
    <h3>History</h3>
    <div id="history"></div>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="hidden">
  <div class="card">
    <h3>System</h3>
    <button onclick="reset()">Reset</button>
  </div>
</div>

</div>

<div class="tabbar">
  <div class="tab active" onclick="nav('dashboard',this)">Plan</div>
  <div class="tab" onclick="nav('progress',this)">Progress</div>
  <div class="tab" onclick="nav('settings',this)">Settings</div>
</div>

<script>

/* ---------------- TRAINING ENGINE ---------------- */

const phases=["BASE","THRESHOLD","VO2","RACE"];

function state(){
  return {
    week:+(localStorage.getItem("week")||1),
    phase:+(localStorage.getItem("phase")||0),
    times:JSON.parse(localStorage.getItem("times")||"[]")
  };
}

function save(s){
  localStorage.setItem("week",s.week);
  localStorage.setItem("phase",s.phase);
  localStorage.setItem("times",JSON.stringify(s.times));
}

function pace(times){
  if(times.length===0) return 5.2;
  let t=times[times.length-1].split(":");
  return (+t[0]*60+ +t[1])/300;
}

function plan(s){
  let p=pace(s.times);

  if(phases[s.phase]==="BASE"){
    return ["Easy 40","3×8 tempo","Recovery","Easy 45","Strides","Long run"];
  }
  if(phases[s.phase]==="THRESHOLD"){
    return ["Easy","5×1K","Recovery","20 tempo","Easy","Long run"];
  }
  if(phases[s.phase]==="VO2"){
    return ["Easy","6×800","Recovery","4×1K","Easy","Long run"];
  }
  return ["Easy","5×1K race","Recovery","Tempo","Easy","Long run"];
}

/* ---------------- WHEEL PICKER ---------------- */

let selectedMin=25;
let selectedSec=0;

function buildWheels(){
  let m=document.getElementById("minWheel");
  let s=document.getElementById("secWheel");

  for(let i=10;i<=60;i++){
    m.innerHTML+=`<div onclick="selectedMin=${i}">${i}</div>`;
  }

  for(let i=0;i<60;i++){
    s.innerHTML+=`<div onclick="selectedSec=${i}">${i.toString().padStart(2,'0')}</div>`;
  }
}

/* ---------------- LOGGING ---------------- */

function logRun(){
  let s=state();

  let time=`${selectedMin}:${selectedSec.toString().padStart(2,'0')}`;

  s.times.push(time);

  if(s.week%4===0) s.phase=Math.min(s.phase+1,3);
  s.week++;

  save(s);
  render();
}

/* ---------------- UI ---------------- */

function render(){
  let s=state();

  document.getElementById("phase").innerText=
    phases[s.phase]+" • Week "+s.week;

  document.getElementById("week").innerHTML=
    plan(s).map(x=>"• "+x).join("<br>");

  document.getElementById("history").innerHTML=
    s.times.map(t=>"🏃 "+t).join("<br>");
}

function nav(id,el){
  ["dashboard","progress","settings"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });

  document.getElementById(id).classList.remove("hidden");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

function reset(){
  localStorage.clear();
  render();
}

/* INIT */
buildWheels();
render();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
