<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5K Coach</title>

<style>
:root{
  --orange:#ff6a00;
  --bg:#0f0f10;
  --card:#1c1c1f;
  --text:#fff;
  --muted:#aaa;
}

body{
  margin:0;
  font-family:-apple-system;
  background:var(--bg);
  color:var(--text);
}

.header{
  position:fixed;
  top:0;
  width:100%;
  background:#1c1c1f;
  padding:14px;
  text-align:center;
  color:var(--orange);
  font-weight:700;
}

.content{ padding:70px 15px 110px; }

.card{
  background:var(--card);
  padding:15px;
  border-radius:14px;
  margin-bottom:15px;
}

h3{ color:var(--orange); margin:0 0 10px; }

input, select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:var(--orange);
  color:white;
  font-weight:600;
}

.entry{
  padding:8px;
  border-bottom:1px solid #333;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

.delete{
  color:#ff4d4d;
  cursor:pointer;
}

.tabbar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#1c1c1f;
  border-top:1px solid #333;
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:12px;
  color:#aaa;
}

.active{ color:var(--orange); font-weight:700; }

.hidden{ display:none; }

canvas{
  width:100%;
  height:180px;
}
</style>
</head>

<body>

<div class="header">🔥 5K COACH</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="card">
    <h3>Week Control</h3>
    <div>Current Week: <span id="weekLabel">1</span></div>
    <button onclick="nextWeek()">Progress Week ➜</button>
    <button onclick="undoWeek()">Undo Week</button>
  </div>

  <div class="card">
    <h3>Weekly Plan</h3>
    <div id="plan"></div>
  </div>

  <div class="card">
    <h3>Log Workout</h3>

    <label>Minutes</label>
    <input id="min" type="number" placeholder="e.g. 25">

    <label>Seconds</label>
    <input id="sec" type="number" placeholder="0–59">

    <label>Distance (km)</label>
    <input id="dist" type="number" step="0.1">

    <label>Type</label>
    <select id="type">
      <option>Easy</option>
      <option>Tempo</option>
      <option>Intervals</option>
      <option>Long Run</option>
    </select>

    <button onclick="saveWorkout()">Save Workout</button>
  </div>

</div>

<!-- PROGRESS -->
<div id="progress" class="hidden">

  <div class="card">
    <h3>Fitness Trend</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>Workout History</h3>
    <div id="list"></div>
  </div>

</div>

<!-- SETTINGS -->
<div id="settings" class="hidden">
  <div class="card">
    <button onclick="resetAll()">Reset All Data</button>
  </div>
</div>

</div>

<div class="tabbar">
  <div class="tab active" onclick="nav('dashboard',this)">Plan</div>
  <div class="tab" onclick="nav('progress',this)">Progress</div>
  <div class="tab" onclick="nav('settings',this)">Settings</div>
</div>

<script>

/* ---------------- STATE ---------------- */

function getState(){
  return {
    week:+(localStorage.getItem("week")||1),
    history:JSON.parse(localStorage.getItem("history")||"[]")
  };
}

function saveState(s){
  localStorage.setItem("week",s.week);
  localStorage.setItem("history",JSON.stringify(s.history));
}

/* ---------------- WEEK CONTROL ---------------- */

function nextWeek(){
  let s=getState();
  s.week++;
  saveState(s);
  render();
}

function undoWeek(){
  let s=getState();
  s.week=Math.max(1,s.week-1);
  saveState(s);
  render();
}

/* ---------------- SAVE WORKOUT ---------------- */

function saveWorkout(){

  let s=getState();

  let m=parseInt(min.value||0);
  let sec=parseInt(sec.value||0);

  if(sec>59) sec=59;

  let time=`${m}:${sec.toString().padStart(2,'0')}`;

  s.history.push({
    time,
    dist:+dist.value,
    type:type.value,
    week:s.week
  });

  saveState(s);
  render();
}

/* ---------------- DELETE ---------------- */

function del(i){
  let s=getState();
  s.history.splice(i,1);
  saveState(s);
  render();
}

/* ---------------- TRAINING PLAN (FULL WEEK) ---------------- */

function plan(w){

  if(w < 4){
    return [
      "Mon: Easy run + strength (40 min)",
      "Tue: Intervals (6×400m)",
      "Wed: Recovery jog / bike",
      "Thu: Tempo run (15–20 min)",
      "Fri: Easy run",
      "Sat: Long run (60 min)",
      "Sun: Rest"
    ];
  }

  if(w < 8){
    return [
      "Mon: Easy + strides",
      "Tue: 5×1K intervals",
      "Wed: Recovery",
      "Thu: Tempo (20–25 min)",
      "Fri: Easy run",
      "Sat: Long run (70–80 min)",
      "Sun: Rest"
    ];
  }

  return [
    "Mon: Easy + drills",
    "Tue: VO2 max (800–1K repeats)",
    "Wed: Recovery",
    "Thu: Race pace tempo",
    "Fri: Easy run",
    "Sat: Long run (steady)",
    "Sun: Rest"
  ];
}

/* ---------------- GRAPH ---------------- */

function draw(){

  let s=getState();

  let c=document.getElementById("chart");
  if(!c) return;

  let ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  let runs=s.history.filter(r=>r.type==="Easy"||r.type==="Tempo");

  if(runs.length===0) return;

  let values=runs.map(r=>{
    let [m,sec]=r.time.split(":");
    let pace=(+m*60+ +sec)/r.dist;
    return pace;
  });

  let max=Math.max(...values);

  values.forEach((v,i)=>{
    let x=i*30;
    let y=c.height-(v/max)*150;

    ctx.fillStyle="#ff6a00";
    ctx.fillRect(x,y,6,6);
  });
}

/* ---------------- RENDER ---------------- */

function render(){

  let s=getState();

  weekLabel.innerText=s.week;

  document.getElementById("plan").innerHTML=
    plan(s.week).map(x=>"• "+x).join("<br>");

  document.getElementById("list").innerHTML=
    s.history.map((r,i)=>
      `<div class="entry">
        ${r.type} ${r.time} ${r.dist}km
        <span class="delete" onclick="del(${i})">✕</span>
      </div>`
    ).join("");

  draw();
}

/* ---------------- NAV ---------------- */

function nav(id,el){

  ["dashboard","progress","settings"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });

  document.getElementById(id).classList.remove("hidden");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

/* ---------------- RESET ---------------- */

function resetAll(){
  localStorage.clear();
  render();
}

/* INIT */

render();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
