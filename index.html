<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ff6a00" />
<link rel="manifest" href="manifest.json" />

<title>5K Coach</title>

<style>
:root{
  --bg:#0f1115;
  --card:#171a21;
  --muted:#8b93a7;
  --text:#fff;
  --accent:#ff6a00;
}

*{
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  padding-bottom:70px;
}

header{
  padding:16px;
  display:flex;
  justify-content:space-between;
  font-weight:700;
}

.week-pill{
  background:var(--card);
  padding:6px 10px;
  border-radius:12px;
  font-size:12px;
  color:var(--muted);
}

.container{padding:12px;}

.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  margin-bottom:12px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  background:var(--accent);
  border:none;
  color:white;
  padding:10px;
  border-radius:10px;
  font-weight:600;
}

button.secondary{background:#2a2f3a;}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#12141a;
  border-top:1px solid #222;
}

.nav button{
  flex:1;
  background:none;
  color:var(--muted);
  padding:14px;
  font-size:12px;
}

.nav button.active{color:var(--accent);}

.hidden{display:none;}

.badge{
  font-size:11px;
  padding:4px 8px;
  background:#222;
  border-radius:10px;
  color:var(--muted);
}

.small{
  font-size:12px;
  color:var(--muted);
  line-height:1.4;
}

canvas{
  width:100%;
  background:#111;
  border-radius:12px;
  margin-top:10px;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.modal-content{
  width:100%;
  max-width:420px;
  background:var(--card);
  padding:16px;
  border-radius:16px;
  max-height:80vh;
  overflow:auto;
}

.phase-card{
  background:#12151c;
  padding:14px;
  border-radius:14px;
  margin-bottom:10px;
}

.phase-active{
  box-shadow:0 0 0 1px rgba(255,106,0,.25),0 10px 20px rgba(0,0,0,.3);
}
</style>
</head>

<body>

<header>
  <div>5K Coach</div>
  <div class="week-pill" id="weekDisplay">Week 1</div>
</header>

<div class="container">

<!-- PLAN -->
<div id="view-plan">

  <div class="card row">
    <button class="secondary" onclick="changeWeek(-1)">Undo Week</button>
    <button onclick="changeWeek(1)">Next Week</button>
  </div>

  <div id="planList"></div>

  <div class="card">
    <button onclick="togglePhases()" style="width:100%">
      Show Phase Overview
    </button>
    <div id="phases" class="hidden" style="margin-top:12px;"></div>
  </div>

</div>

<!-- PROGRESS -->
<div id="view-progress" class="hidden">

  <div class="card">
    <div>Log Run</div>

    <label>Minutes</label>
    <input id="min" type="number"/>

    <label>Seconds</label>
    <input id="sec" type="number"/>

    <label>Distance</label>
    <input id="dist" type="number"/>

    <label>Type</label>
    <select id="type">
      <option>Easy</option>
      <option>Tempo</option>
      <option>Intervals</option>
      <option>Long</option>
    </select>

    <button onclick="addRun()" style="margin-top:10px;">Save</button>
  </div>

  <div class="card">
    <div>Performance</div>
    <canvas id="chart" height="160"></canvas>
  </div>

  <div id="history"></div>
</div>

<!-- SETTINGS -->
<div id="view-settings" class="hidden">
  <div class="card">
    <div>Settings</div>
    <button class="secondary" onclick="clearAll()">Reset</button>
  </div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="switchTab('plan')" class="active">Plan</button>
  <button onclick="switchTab('progress')">Progress</button>
  <button onclick="switchTab('settings')">Settings</button>
</div>

<script>

let week=parseInt(localStorage.getItem("week")||"1");
let workouts=JSON.parse(localStorage.getItem("workouts")||"[]");

/* ───────────── PHASE ENGINE ───────────── */
function getPhase(w){
  if(w<=4) return 1;
  if(w<=8) return 2;
  if(w<=12) return 3;
  if(w<=16) return 4;
  if(w<=20) return 5;
  return 6;
}

/* ───────────── TRI-MODAL TRAINING PLAN ───────────── */
function getPhasePlan(w){

const p=getPhase(w);

/* PHASE 1 */
if(p===1){
return [
{day:"Mon",type:"Gym Strength",summary:"Full body strength (light)"},
{day:"Tue",type:"Easy Run",summary:"Aerobic base"},
{day:"Wed",type:"Bike Aerobic",summary:"Zone 2 endurance"},
{day:"Thu",type:"Easy Run",summary:"Easy aerobic"},
{day:"Fri",type:"REST / Mobility",summary:"Recovery"},
{day:"Sat",type:"Long Run",summary:"60–75 min easy"},
{day:"Sun",type:"Bike Recovery",summary:"Very light spin"}
];
}

/* PHASE 2 */
if(p===2){
return [
{day:"Mon",type:"Gym Strength",summary:"Progressive strength"},
{day:"Tue",type:"Bike Intervals",summary:"2–3 min intervals"},
{day:"Wed",type:"Easy Run",summary:"Recovery run"},
{day:"Thu",type:"Tempo Run",summary:"Threshold intro"},
{day:"Fri",type:"Bike Aerobic",summary:"Zone 2 base"},
{day:"Sat",type:"Long Run",summary:"Endurance"},
{day:"Sun",type:"REST",summary:"Recovery"}
];
}

/* PHASE 3 */
if(p===3){
return [
{day:"Mon",type:"Gym Strength",summary:"Power + stability"},
{day:"Tue",type:"400m Intervals",summary:"6–8 reps"},
{day:"Wed",type:"Bike Recovery",summary:"Flush ride"},
{day:"Thu",type:"Tempo Run",summary:"20–30 min"},
{day:"Fri",type:"Easy Run",summary:"Recovery"},
{day:"Sat",type:"Long Run",summary:"75–90 min"},
{day:"Sun",type:"REST",summary:"Recovery"}
];
}

/* PHASE 4 */
if(p===4){
return [
{day:"Mon",type:"Gym Maintenance",summary:"Light strength"},
{day:"Tue",type:"800m–1K Intervals",summary:"VO₂ max work"},
{day:"Wed",type:"Bike Aerobic",summary:"Low impact endurance"},
{day:"Thu",type:"Tempo Short",summary:"Threshold"},
{day:"Fri",type:"REST",summary:"Recovery"},
{day:"Sat",type:"Long Run (reduced)",summary:"Moderate"},
{day:"Sun",type:"Bike Recovery",summary:"Easy spin"}
];
}

/* PHASE 5 */
if(p===5){
return [
{day:"Mon",type:"Gym Activation",summary:"Explosive light work"},
{day:"Tue",type:"Race Intervals",summary:"1K + 400m reps"},
{day:"Wed",type:"Bike Recovery",summary:"Easy spin"},
{day:"Thu",type:"Race Pace",summary:"4:00/km work"},
{day:"Fri",type:"Easy Run",summary:"Recovery"},
{day:"Sat",type:"Long Run (short)",summary:"Reduced"},
{day:"Sun",type:"REST",summary:"Recovery"}
];
}

/* PHASE 6 */
return [
{day:"Mon",type:"Gym Activation",summary:"Light activation"},
{day:"Tue",type:"Sharpening",summary:"Short fast reps"},
{day:"Wed",type:"Bike Recovery",summary:"Very light"},
{day:"Thu",type:"Race Strides",summary:"Neuromuscular"},
{day:"Fri",type:"REST",summary:"Recovery"},
{day:"Sat",type:"Shakeout Run",summary:"Very easy"},
{day:"Sun",type:"RACE",summary:"Peak performance"}
];

}

/* ───────────── RENDER ───────────── */
function renderPlan(){

document.getElementById("weekDisplay").innerText="Week "+week;

const plan=getPhasePlan(week);
const el=document.getElementById("planList");

el.innerHTML="";

plan.forEach(p=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<div class="row">
<strong>${p.day}</strong>
<span class="badge">${p.type}</span>
</div>
<div class="small">${p.summary}</div>
`;
div.onclick=()=>openModal(p);
el.appendChild(div);
});

renderPhases();
drawChart();
renderHistory();
}

/* ───────────── MODAL ───────────── */
function openModal(p){
document.getElementById("modal").style.display="flex";
document.getElementById("modalContent").innerHTML=`
<h3>${p.day} — ${p.type}</h3>
<p class="small">${p.summary}</p>
<button style="width:100%;margin-top:10px" onclick="closeModal()">Close</button>
`;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* ───────────── PHASE UI ───────────── */
function getPhases(){
return [
{name:"Base",start:1,end:4,color:"#4aa3ff"},
{name:"Aerobic",start:5,end:8},
{name:"Threshold",start:9,end:12,color:"#ff6a00"},
{name:"VO₂ Max",start:13,end:16,color:"#ff4d4d"},
{name:"Race",start:17,end:20,color:"#b26cff"},
{name:"Taper",start:21,end:24,color:"#22c55e"}
];
}

function renderPhases(){
const el=document.getElementById("phases");
el.innerHTML="";

getPhases().forEach(p=>{
const active=week>=p.start&&week<=p.end;
const div=document.createElement("div");
div.className="phase-card"+(active?" phase-active":"");
div.innerHTML=`
<strong>${p.name}</strong>
<div class="small">${p.start}–${p.end}</div>
`;
el.appendChild(div);
});
}

function togglePhases(){
document.getElementById("phases").classList.toggle("hidden");
}

/* ───────────── WEEK ───────────── */
function changeWeek(d){
week=Math.max(1,week+d);
localStorage.setItem("week",week);
renderPlan();
}

/* ───────────── LOGGING ───────────── */
function addRun(){
workouts.push({
id:Date.now(),
dist:parseFloat(dist.value||0),
type:type.value
});
localStorage.setItem("workouts",JSON.stringify(workouts));
renderHistory();
drawChart();
}

/* ───────────── HISTORY ───────────── */
function renderHistory(){
const h=document.getElementById("history");
h.innerHTML="";
workouts.slice().reverse().forEach(w=>{
h.innerHTML+=`<div class="card">${w.type} — ${w.dist} km</div>`;
});
}

/* ───────────── CHART (SAFE) ───────────── */
function drawChart(){
const c=document.getElementById("chart");
const ctx=c.getContext("2d");
ctx.clearRect(0,0,c.width,c.height);
}

/* ───────────── NAV ───────────── */
function switchTab(t){
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

["plan","progress","settings"].forEach(x=>{
document.getElementById("view-"+x).classList.add("hidden");
});

document.getElementById("view-"+t).classList.remove("hidden");
}

renderPlan();

</script>

</body>
</html>
