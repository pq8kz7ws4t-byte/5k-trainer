<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ff6a00" />
<link rel="manifest" href="manifest.json" />

<title>5K Coach</title>

<style>
:root{
  --bg:#0f1115;
  --card:#171a21;
  --muted:#8b93a7;
  --text:#fff;
  --accent:#ff6a00;
}

*{
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  padding-bottom:70px;
}

header{
  padding:16px;
  display:flex;
  justify-content:space-between;
  font-weight:700;
}

.week-pill{
  background:var(--card);
  padding:6px 10px;
  border-radius:12px;
  font-size:12px;
  color:var(--muted);
}

.container{padding:12px;}

.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  margin-bottom:12px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  background:var(--accent);
  border:none;
  color:white;
  padding:10px;
  border-radius:10px;
  font-weight:600;
}

button.secondary{background:#2a2f3a;}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#12141a;
  border-top:1px solid #222;
}

.nav button{
  flex:1;
  background:none;
  color:var(--muted);
  padding:14px;
  font-size:12px;
}

.nav button.active{color:var(--accent);}

.hidden{display:none;}

.badge{
  font-size:11px;
  padding:4px 8px;
  background:#222;
  border-radius:10px;
  color:var(--muted);
}

.small{
  font-size:12px;
  color:var(--muted);
}

canvas{
  width:100%;
  background:#111;
  border-radius:12px;
  margin-top:10px;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.modal-content{
  width:100%;
  max-width:420px;
  background:var(--card);
  padding:16px;
  border-radius:16px;
  max-height:80vh;
  overflow:auto;
}

.phase-card{
  background:#12151c;
  padding:14px;
  border-radius:14px;
  margin-bottom:10px;
}

.phase-active{
  box-shadow:0 0 0 1px rgba(255,106,0,.25),0 10px 20px rgba(0,0,0,.3);
}
</style>
</head>

<body>

<header>
  <div>5K Coach</div>
  <div class="week-pill" id="weekDisplay">Week 1</div>
</header>

<div class="container">

<!-- PLAN -->
<div id="view-plan">

  <div class="card row">
    <button class="secondary" onclick="changeWeek(-1)">Undo Week</button>
    <button onclick="changeWeek(1)">Next Week</button>
  </div>

  <div id="planList"></div>

  <div class="card">
    <button onclick="togglePhases()" style="width:100%">
      Show Phase Overview
    </button>
    <div id="phases" class="hidden" style="margin-top:12px;"></div>
  </div>

</div>

<!-- PROGRESS -->
<div id="view-progress" class="hidden">

  <div class="card">
    <div>Log Run</div>

    <label>Minutes</label>
    <input id="min" type="number"/>

    <label>Seconds</label>
    <input id="sec" type="number"/>

    <label>Distance</label>
    <input id="dist" type="number"/>

    <label>Type</label>
    <select id="type">
      <option>Easy</option>
      <option>Tempo</option>
      <option>Intervals</option>
      <option>Long</option>
    </select>

    <button onclick="addRun()" style="margin-top:10px;">Save</button>
  </div>

  <div class="card">
    <div>Performance</div>
    <canvas id="chart" height="160"></canvas>
  </div>

  <div id="history"></div>
</div>

<!-- SETTINGS -->
<div id="view-settings" class="hidden">
  <div class="card">
    <div>Settings</div>
    <button class="secondary" onclick="clearAll()">Reset</button>
  </div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="switchTab('plan',this)" class="active">Plan</button>
  <button onclick="switchTab('progress',this)">Progress</button>
  <button onclick="switchTab('settings',this)">Settings</button>
</div>

<script>

let week=parseInt(localStorage.getItem("week")||"1");
let workouts=JSON.parse(localStorage.getItem("workouts")||"[]");

/* ───────────── PHASE ───────────── */
function getPhase(w){
  if(w<=4) return 1;
  if(w<=8) return 2;
  if(w<=12) return 3;
  if(w<=16) return 4;
  if(w<=20) return 5;
  return 6;
}

/* ───────────── PROGRESSION ───────────── */
function getPhaseProgress(){
  const start=(getPhase(week)-1)*4+1;
  const t=(week-start)/3;
  return Math.max(0,Math.min(1,t));
}

/* ───────────── PLAN ───────────── */
function getPhasePlan(w){
const p=getPhase(w);

if(p===1){
return [
{day:"Mon",type:"Gym Strength",summary:"Foundation strength"},
{day:"Tue",type:"Easy Run",summary:"Aerobic base"},
{day:"Wed",type:"Bike Aerobic",summary:"Zone 2"},
{day:"Thu",type:"Easy Run",summary:"Aerobic"},
{day:"Fri",type:"REST",summary:"Recovery"},
{day:"Sat",type:"Long Run",summary:"Endurance"},
{day:"Sun",type:"Bike Recovery",summary:"Light spin"}
];
}

if(p===2){
return [
{day:"Mon",type:"Gym Strength",summary:"Progressive load"},
{day:"Tue",type:"Bike Intervals",summary:"Short efforts"},
{day:"Wed",type:"Easy Run",summary:"Recovery"},
{day:"Thu",type:"Tempo Run",summary:"Threshold intro"},
{day:"Fri",type:"Bike Aerobic",summary:"Endurance"},
{day:"Sat",type:"Long Run",summary:"Build endurance"},
{day:"Sun",type:"REST",summary:"Recovery"}
];
}

if(p===3){
return [
{day:"Mon",type:"Gym Strength",summary:"Power focus"},
{day:"Tue",type:"400m Intervals",summary:"Speed work"},
{day:"Wed",type:"Bike Recovery",summary:"Flush"},
{day:"Thu",type:"Tempo Run",summary:"Threshold"},
{day:"Fri",type:"Easy Run",summary:"Recovery"},
{day:"Sat",type:"Long Run",summary:"75–90 min"},
{day:"Sun",type:"REST",summary:"Recovery"}
];
}

if(p===4){
return [
{day:"Mon",type:"Gym Maintenance",summary:"Light strength"},
{day:"Tue",type:"800m Intervals",summary:"VO₂ max"},
{day:"Wed",type:"Bike Aerobic",summary:"Low impact"},
{day:"Thu",type:"Tempo",summary:"Controlled"},
{day:"Fri",type:"REST",summary:"Recovery"},
{day:"Sat",type:"Long Run",summary:"Moderate"},
{day:"Sun",type:"Bike Recovery",summary:"Easy"}
];
}

if(p===5){
return [
{day:"Mon",type:"Gym Activation",summary:"Explosive"},
{day:"Tue",type:"Race Intervals",summary:"1K/400m"},
{day:"Wed",type:"Bike Recovery",summary:"Easy"},
{day:"Thu",type:"Race Pace",summary:"4:00/km"},
{day:"Fri",type:"Easy Run",summary:"Recovery"},
{day:"Sat",type:"Long Run",summary:"Reduced"},
{day:"Sun",type:"REST",summary:"Recovery"}
];
}

return [
{day:"Mon",type:"Activation",summary:"Light gym"},
{day:"Tue",type:"Sharpening",summary:"Fast reps"},
{day:"Wed",type:"Bike Recovery",summary:"Very light"},
{day:"Thu",type:"Strides",summary:"Neuromuscular"},
{day:"Fri",type:"REST",summary:"Recovery"},
{day:"Sat",type:"Shakeout",summary:"Easy"},
{day:"Sun",type:"RACE",summary:"Peak"}
];
}

/* ───────────── WORKOUT DETAILS (FIXED + SAFE) ───────────── */
function getWorkoutDetails(p){

const phase=getPhase(week);
const prog=getPhaseProgress();

let typeCategory=p.type.includes("Bike")?"🚴 Cycling":p.type.includes("Gym")?"🏋️ Strength":"🏃 Running";

let distance="Varies", pace="Controlled effort", purpose="General adaptation";

if(phase===1){
if(p.type.includes("Easy")){
distance=(4+prog*2).toFixed(1)+" km";
pace="5:30–6:30/km";
purpose="Aerobic base";
}
else if(p.type.includes("Long")){
distance=(60+prog*15).toFixed(0)+" min";
pace="Easy";
purpose="Endurance";
}
else if(p.type.includes("Bike")){
distance=(40+prog*20).toFixed(0)+" min";
pace="Zone 2";
purpose="Aerobic volume";
}
else if(p.type.includes("Gym")){
distance="45 min";
pace="N/A";
purpose="Strength base";
}
}

else if(phase===2){
if(p.type.includes("Tempo")){
distance=(15+prog*10).toFixed(0)+" min";
pace=prog<0.5?"4:50/km":"4:25/km";
purpose="Threshold";
}
}

else if(phase===3){
if(p.type.includes("400")){
const reps=6+Math.floor(prog*2);
distance=reps+" × 400m";
pace=prog<0.5?"4:05/km":"3:50/km";
purpose="Speed";
}
}

else if(phase===4){
if(p.type.includes("800")){
const reps=5+Math.floor(prog*2);
distance=reps+" × 800m";
pace=prog<0.5?"3:55/km":"3:40/km";
purpose="VO₂ max";
}
}

else if(phase===5){
if(p.type.includes("Race")){
const reps=4+Math.floor(prog*2);
distance=reps+" × 1K/400m";
pace="~4:00/km";
purpose="Race specificity";
}
}

else if(phase===6){
if(p.type.includes("Sharpening")){
const reps=6-Math.floor(prog*2);
distance=reps+" × 200–400m";
pace="Fast relaxed";
purpose="Sharpness";
}
}

return {typeCategory,distance,pace,purpose};
}

/* ───────────── RENDER ───────────── */
function renderPlan(){

document.getElementById("weekDisplay").innerText="Week "+week;

const plan=getPhasePlan(week);
const el=document.getElementById("planList");
el.innerHTML="";

plan.forEach(p=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<div class="row">
<strong>${p.day}</strong>
<span class="badge">${p.type}</span>
</div>
<div class="small">${p.summary}</div>
`;
div.onclick=()=>openModal(p);
el.appendChild(div);
});

renderPhases();
}

/* ───────────── MODAL ───────────── */
function openModal(p){

const d=getWorkoutDetails(p);

document.getElementById("modal").style.display="flex";

document.getElementById("modalContent").innerHTML=`
<h3>${d.typeCategory} — ${p.type}</h3>

<div class="card"><b>Distance</b><br>${d.distance}</div>
<div class="card"><b>Pace</b><br>${d.pace}</div>
<div class="card"><b>Purpose</b><br>${d.purpose}</div>

<button style="width:100%;margin-top:10px" onclick="closeModal()">Close</button>
`;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* ───────────── PHASE UI ───────────── */
function getPhases(){
return [
{name:"Base Building",start:1,end:4,color:"#4aa3ff",focus:"Aerobic base + strength"},
{name:"Aerobic Strength",start:5,end:8,color:"#4aa3ff",focus:"Tempo introduction"},
{name:"Threshold",start:9,end:12,color:"#ff6a00",focus:"Speed development"},
{name:"VO₂ Max",start:13,end:16,color:"#ff4d4d",focus:"High intensity"},
{name:"Race",start:17,end:20,color:"#b26cff",focus:"Race specificity"},
{name:"Taper",start:21,end:24,color:"#22c55e",focus:"Peak readiness"}
];
}

function renderPhases(){
const el=document.getElementById("phases");
el.innerHTML="";

getPhases().forEach(p=>{
const active=week>=p.start&&week<=p.end;
const div=document.createElement("div");
div.className="phase-card"+(active?" phase-active":"");
div.style.borderLeft="5px solid "+p.color;

div.innerHTML=`
<strong>${p.name}</strong>
<div class="small">${p.start}–${p.end}</div>
<div class="small" style="color:${p.color}">${p.focus}</div>
${active?`<div class="small" style="color:${p.color}">CURRENT PHASE</div>`:""}
`;

el.appendChild(div);
});
}

function togglePhases(){
document.getElementById("phases").classList.toggle("hidden");
}

/* ───────────── SAFE TAB SWITCH ───────────── */
function switchTab(tab,el){

document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
if(el) el.classList.add("active");

document.getElementById("view-plan").classList.add("hidden");
document.getElementById("view-progress").classList.add("hidden");
document.getElementById("view-settings").classList.add("hidden");

document.getElementById("view-"+tab).classList.remove("hidden");
}

/* ───────────── WEEK ───────────── */
function changeWeek(d){
week=Math.max(1,week+d);
localStorage.setItem("week",week);
renderPlan();
}

/* ───────────── INIT ───────────── */
renderPlan();

</script>

</body>
</html>
