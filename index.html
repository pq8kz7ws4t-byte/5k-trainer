<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5K Adaptive Coach</title>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#f2f2f7;
}

.header {
  position:fixed;
  top:0;
  width:100%;
  background:white;
  padding:14px;
  text-align:center;
  font-weight:700;
  border-bottom:1px solid #ddd;
}

.content {
  padding:70px 15px 100px;
}

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.small {
  font-size:13px;
  color:#666;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#007aff;
  color:white;
  font-size:16px;
}

input, textarea {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.tabbar {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}

.tab {
  flex:1;
  text-align:center;
  padding:10px;
  font-size:12px;
}

.active { color:#007aff; font-weight:700; }

.hidden { display:none; }
</style>
</head>

<body>

<div class="header">🏃 Adaptive 5K Coach</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="card">
    <h3>Current Phase</h3>
    <div id="phaseText"></div>
    <div class="small" id="goalText"></div>
  </div>

  <div class="card">
    <h3>This Week's Plan</h3>
    <div id="weekPlan"></div>
  </div>

  <div class="card">
    <h3>Log 5K</h3>
    <input id="timeInput" placeholder="e.g. 25:30">
    <button onclick="logRun()">Save Run</button>
  </div>
</div>

<!-- PROGRESS -->
<div id="progress" class="hidden">
  <div class="card">
    <h3>Progress History</h3>
    <div id="history"></div>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="hidden">
  <div class="card">
    <h3>Coach Settings</h3>
    <button onclick="resetPlan()">Reset Training Cycle</button>
  </div>
</div>

</div>

<!-- NAV -->
<div class="tabbar">
  <div class="tab active" onclick="show('dashboard',this)">Plan</div>
  <div class="tab" onclick="show('progress',this)">Progress</div>
  <div class="tab" onclick="show('settings',this)">Settings</div>
</div>

<script>

/* -----------------------------
   CORE TRAINING ENGINE
----------------------------- */

const phases = ["BASE","THRESHOLD","VO2","RACE"];

function getState() {
  return {
    week: parseInt(localStorage.getItem("week") || "1"),
    phase: parseInt(localStorage.getItem("phase") || "0"),
    times: JSON.parse(localStorage.getItem("times") || "[]")
  };
}

function saveState(state) {
  localStorage.setItem("week", state.week);
  localStorage.setItem("phase", state.phase);
  localStorage.setItem("times", JSON.stringify(state.times));
}

/* -----------------------------
   PACING MODEL (simple adaptive)
----------------------------- */

function getPaces() {
  const times = JSON.parse(localStorage.getItem("times") || "[]");

  let base = 5.2; // min/km default

  if (times.length > 0) {
    let last = times[times.length - 1];
    let p = last.split(":");
    let sec = (+p[0]*60 + +p[1]) / 300; // normalize
    base = sec;
  }

  return {
    easy: (base + 0.8).toFixed(2),
    tempo: (base + 0.2).toFixed(2),
    interval: (base - 0.4).toFixed(2)
  };
}

/* -----------------------------
   TRAINING GENERATOR
----------------------------- */

function generateWeek(state) {

  let phase = phases[state.phase];
  let p = getPaces();

  let plan = [];

  if (phase === "BASE") {
    plan = [
      "Easy 40 min",
      "3×8 min tempo @" + p.tempo,
      "Rest / Bike",
      "Easy 45 min",
      "Strides 6×20s",
      "Long run 70 min",
      "Rest"
    ];
  }

  if (phase === "THRESHOLD") {
    plan = [
      "Easy + strength",
      "5×1K @" + p.interval,
      "Recovery",
      "20 min tempo",
      "Easy run",
      "Long run 80 min",
      "Rest"
    ];
  }

  if (phase === "VO2") {
    plan = [
      "Easy",
      "6×800m fast",
      "Recovery",
      "4×1K @" + p.interval,
      "Easy",
      "Long run 85 min",
      "Rest"
    ];
  }

  if (phase === "RACE") {
    plan = [
      "Easy",
      "5×1K @ goal pace",
      "Recovery",
      "15 min tempo",
      "Easy",
      "Long run 70 min",
      "Rest"
    ];
  }

  return plan;
}

/* -----------------------------
   PROGRESSION LOGIC
----------------------------- */

function advance(state) {
  state.week++;

  if (state.week % 4 === 0) {
    state.phase = Math.min(state.phase + 1, phases.length - 1);
  }

  saveState(state);
}

/* -----------------------------
   UI
----------------------------- */

function render() {
  let state = getState();

  document.getElementById("phaseText").innerText =
    phases[state.phase] + " (Week " + state.week + ")";

  document.getElementById("goalText").innerText =
    "Target: 20:00 5K (4:00/km)";

  let week = generateWeek(state);

  document.getElementById("weekPlan").innerHTML =
    week.map(d => "• " + d).join("<br>");

  let history = JSON.parse(localStorage.getItem("times") || "[]");

  document.getElementById("history").innerHTML =
    history.map(t => "🏃 " + t).join("<br>");
}

/* -----------------------------
   ACTIONS
----------------------------- */

function logRun() {
  let val = document.getElementById("timeInput").value;
  let state = getState();

  state.times.push(val);

  advance(state);
  saveState(state);
  render();
}

function resetPlan() {
  localStorage.clear();
  render();
}

function show(id,el){
  ["dashboard","progress","settings"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });

  document.getElementById(id).classList.remove("hidden");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

/* INIT */
render();

</script>

</body>
</html>
