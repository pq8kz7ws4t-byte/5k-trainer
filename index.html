<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5K Coach</title>

<style>
:root{
  --orange:#ff6a00;
  --bg:#0f0f10;
  --card:#1c1c1f;
  --text:#fff;
  --muted:#aaa;
}

body{
  margin:0;
  font-family:-apple-system;
  background:var(--bg);
  color:var(--text);
}

.header{
  position:fixed;
  top:0;
  width:100%;
  background:#1c1c1f;
  padding:14px;
  text-align:center;
  color:var(--orange);
  font-weight:700;
}

/* ---------------- PAGES ---------------- */

.page{
  display:none;
  padding:70px 15px 110px;
}

.activePage{
  display:block;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:14px;
  margin-bottom:15px;
}

h3{ color:var(--orange); margin:0 0 10px; }

input, select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:var(--orange);
  color:white;
  font-weight:600;
}

.entry{
  padding:8px;
  border-bottom:1px solid #333;
  display:flex;
  justify-content:space-between;
  font-size:14px;
  cursor:pointer;
}

.delete{
  color:#ff4d4d;
}

/* ---------------- NAV ---------------- */

.tabbar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#1c1c1f;
  border-top:1px solid #333;
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:12px;
  color:#aaa;
}

.active{
  color:var(--orange);
  font-weight:700;
}

canvas{
  width:100%;
  height:200px;
}
</style>
</head>

<body>

<div class="header">🔥 5K COACH</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page activePage">

  <div class="card">
    <h3>Week Control</h3>
    <div>Week: <span id="weekLabel"></span></div>
    <button onclick="nextWeek()">Next Week</button>
    <button onclick="undoWeek()">Undo Week</button>
  </div>

  <div class="card">
    <h3>Weekly Plan</h3>
    <div id="plan"></div>
  </div>

  <div class="card">
    <h3>Log Workout</h3>

    <input id="min" type="number" placeholder="minutes">
    <input id="sec" type="number" placeholder="seconds">
    <input id="dist" type="number" step="0.1" placeholder="km">

    <select id="type">
      <option>Easy</option>
      <option>Tempo</option>
      <option>Intervals</option>
      <option>Long Run</option>
    </select>

    <button onclick="saveWorkout()">Save Workout</button>
  </div>

</div>

<!-- PROGRESS -->
<div id="progress" class="page">

  <div class="card">
    <h3>Fitness Trend</h3>
    <canvas id="chart"></canvas>
    <div id="legend"></div>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="list"></div>
  </div>

</div>

<!-- SETTINGS -->
<div id="settings" class="page">

  <div class="card">
    <button onclick="resetAll()">Reset All</button>
  </div>

</div>

<!-- NAV -->
<div class="tabbar">
  <div class="tab active" onclick="nav('dashboard',this)">Plan</div>
  <div class="tab" onclick="nav('progress',this)">Progress</div>
  <div class="tab" onclick="nav('settings',this)">Settings</div>
</div>

<script>

/* ---------------- STATE ---------------- */

function getState(){
  return {
    week:+(localStorage.getItem("week")||1),
    history:JSON.parse(localStorage.getItem("history")||"[]")
  };
}

function saveState(s){
  localStorage.setItem("week",s.week);
  localStorage.setItem("history",JSON.stringify(s.history));
}

/* ---------------- NAV ---------------- */

function nav(page,el){

  document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
  document.getElementById(page).classList.add("activePage");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

/* ---------------- WEEK ---------------- */

function nextWeek(){
  let s=getState();
  s.week++;
  saveState(s);
  render();
}

function undoWeek(){
  let s=getState();
  s.week=Math.max(1,s.week-1);
  saveState(s);
  render();
}

/* ---------------- SAVE (FIXED) ---------------- */

function saveWorkout(){

  let s=getState();

  const m = document.getElementById("min").value;
  const sec = document.getElementById("sec").value;
  const dist = document.getElementById("dist").value;
  const type = document.getElementById("type").value;

  if(!m || !sec || !dist){
    alert("Fill all fields");
    return;
  }

  const time = `${m}:${Math.min(sec,59).toString().padStart(2,'0')}`;

  s.history.push({
    time,
    dist:+dist,
    type
  });

  saveState(s);

  document.getElementById("min").value="";
  document.getElementById("sec").value="";
  document.getElementById("dist").value="";

  render();
}

/* ---------------- DELETE ---------------- */

function del(i){
  let s=getState();
  s.history.splice(i,1);
  saveState(s);
  render();
}

/* ---------------- PLAN ---------------- */

function plan(w){

  return [
    "Mon: Easy + strength",
    "Tue: Intervals (6×400m)",
    "Wed: Recovery",
    "Thu: Tempo run",
    "Fri: Easy",
    "Sat: Long run",
    "Sun: Rest"
  ].map(x=>`• ${x}`).join("<br>");
}

/* ---------------- GRAPH ---------------- */

function draw(){

  let s=getState();
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  let runs=s.history;

  let values=runs.map(r=>{
    let [m,sec]=r.time.split(":");
    return ((+m*60+ +sec)/r.dist);
  });

  let max=Math.max(...values,1);

  ctx.beginPath();

  values.forEach((v,i)=>{

    let x=i*25;
    let y=c.height-(v/max)*150;

    ctx.strokeStyle="#ff6a00";
    ctx.fillStyle="#ff6a00";

    ctx.lineTo(x,y);
    ctx.arc(x,y,4,0,Math.PI*2);
    ctx.moveTo(x,y);
  });

  ctx.stroke();

  document.getElementById("legend").innerHTML =
    `<span style="color:#ff6a00">● Pace trend</span>`;
}

/* ---------------- RENDER ---------------- */

function render(){

  let s=getState();

  weekLabel.innerText=s.week;

  document.getElementById("plan").innerHTML=plan(s.week);

  document.getElementById("list").innerHTML=
    s.history.map((r,i)=>
      `<div class="entry">
        ${r.type} ${r.time} ${r.dist}km
        <span class="delete" onclick="del(${i})">✕</span>
      </div>`
    ).join("");

  draw();
}

render();

</script>

</body>
</html>
