<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5K Coach</title>

<style>
:root{
  --orange:#ff6a00;
  --bg:#0f0f10;
  --card:#1c1c1f;
  --text:#fff;
  --muted:#aaa;
}

body{
  margin:0;
  font-family:-apple-system;
  background:var(--bg);
  color:var(--text);
}

.header{
  position:fixed;
  top:0;
  width:100%;
  background:#1c1c1f;
  padding:14px;
  text-align:center;
  color:var(--orange);
  font-weight:700;
}

.content{ padding:70px 15px 110px; }

.card{
  background:var(--card);
  padding:15px;
  border-radius:14px;
  margin-bottom:15px;
}

h3{ color:var(--orange); margin:0 0 10px; }

input, select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:var(--orange);
  color:white;
  font-weight:600;
}

.entry{
  padding:8px;
  border-bottom:1px solid #333;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

.delete{ color:#ff4d4d; cursor:pointer; }

.tabbar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#1c1c1f;
  border-top:1px solid #333;
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:12px;
  color:#aaa;
}

.active{ color:var(--orange); font-weight:700; }

.hidden{ display:none; }

canvas{
  width:100%;
  height:180px;
}
</style>
</head>

<body>

<div class="header">🔥 5K COACH</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="card">
    <h3>Week Control</h3>
    <div>Current Week: <span id="weekLabel">1</span></div>
    <button onclick="nextWeek()">Progress Week ➜</button>
    <button onclick="undoWeek()">Undo Week</button>
  </div>

  <div class="card">
    <h3>This Week Plan</h3>
    <div id="plan"></div>
  </div>

  <div class="card">
    <h3>Log Workout</h3>

    <label>Time</label>
    <input id="min" type="number" placeholder="minutes">
    <input id="sec" type="number" placeholder="seconds (0-59)">

    <label>Distance (km)</label>
    <input id="dist" type="number" step="0.1">

    <label>Type</label>
    <select id="type">
      <option>Easy</option>
      <option>Tempo</option>
      <option>Intervals</option>
      <option>Long Run</option>
    </select>

    <button onclick="save()">Save Workout</button>
  </div>

</div>

<!-- PROGRESS -->
<div id="progress" class="hidden">

  <div class="card">
    <h3>Fitness Trend</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>Workouts</h3>
    <div id="list"></div>
  </div>

</div>

<!-- SETTINGS -->
<div id="settings" class="hidden">
  <div class="card">
    <button onclick="reset()">Reset</button>
  </div>
</div>

</div>

<div class="tabbar">
  <div class="tab active" onclick="nav('dashboard',this)">Plan</div>
  <div class="tab" onclick="nav('progress',this)">Progress</div>
  <div class="tab" onclick="nav('settings',this)">Settings</div>
</div>

<script>

/* ---------------- STATE ---------------- */

function get(){
  return {
    week:+(localStorage.getItem("week")||1),
    history:JSON.parse(localStorage.getItem("history")||"[]")
  };
}

function save(s){
  localStorage.setItem("week",s.week);
  localStorage.setItem("history",JSON.stringify(s.history));
}

/* ---------------- WEEK CONTROL ---------------- */

function nextWeek(){
  let s=get();
  s.week++;
  save(s);
  render();
}

function undoWeek(){
  let s=get();
  s.week=Math.max(1,s.week-1);
  save(s);
  render();
}

/* ---------------- PACING ADJUSTMENT ---------------- */

function adjustedPace(time,dist){
  let sec = time*60;
  return sec / dist;
}

/* ---------------- SAVE ---------------- */

function save(){
  let s=get();

  let m=+min.value;
  let sec=+sec.value;

  if(sec>59) sec=59;

  let time=`${m}:${sec.toString().padStart(2,'0')}`;

  s.history.push({
    time,
    dist:+dist.value,
    type:type.value,
    week:s.week
  });

  save(s);
  render();
}

/* ---------------- DELETE ---------------- */

function del(i){
  let s=get();
  s.history.splice(i,1);
  save(s);
  render();
}

/* ---------------- PLAN ---------------- */

function plan(w){
  if(w<4) return ["Base","Easy + strides","Long run"];
  if(w<8) return ["Threshold","Intervals","Long run"];
  return ["VO2","Race pace","Long run"];
}

/* ---------------- GRAPH (FIXED) ---------------- */

function draw(){
  let s=get();
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  let runs=s.history.filter(r=>r.type==="Easy"||r.type==="Tempo");

  let max=0;

  let data=runs.map(r=>{
    let [m,sec]=r.time.split(":");
    let pace=adjustedPace(+m*60+ +sec,r.dist);
    max=Math.max(max,pace);
    return pace;
  });

  data.forEach((p,i)=>{
    let x=i*30;
    let y=c.height-(p/max)*150;

    ctx.fillStyle="#ff6a00";
    ctx.fillRect(x,y,6,6);
  });
}

/* ---------------- RENDER ---------------- */

function render(){
  let s=get();

  weekLabel.innerText=s.week;

  document.getElementById("plan").innerHTML=
    plan(s.week).map(x=>"• "+x).join("<br>");

  document.getElementById("list").innerHTML=
    s.history.map((r,i)=>
      `<div class="entry">
        ${r.type} ${r.time} ${r.dist}km
        <span class="delete" onclick="del(${i})">✕</span>
      </div>`
    ).join("");

  draw();
}

/* ---------------- NAV ---------------- */

function nav(id,el){
  ["dashboard","progress","settings"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });

  document.getElementById(id).classList.remove("hidden");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

/* RESET */

function reset(){
  localStorage.clear();
  render();
}

/* INIT */

render();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
